- type: entity
  parent: BaseGameRule
  id: Changeling
  components:
  - type: ChangelingRule
  - type: GameRule
    minPlayers: 15
    delay:
      min: 240
      max: 420
  - type: AntagSelection
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 6
      playerRatio: 15
      lateJoinAdditional: true
      mindComponents:
      - type: ChangelingRole
        prototype: Changeling

- type: entity
  parent: BaseTraitorRule
  id: CalmTraitor # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 240
      max: 420
  - type: AntagSelection
    definitions:
    - prefRoles: [ Traitor ]
      max: 5
      playerRatio: 15
      blacklist:
        components:
        - AntagImmune
        - Changeling
      lateJoinAdditional: true
      mindComponents:
      - type: TraitorRole
        prototype: Traitor
        
- type: entity
  parent: Changeling
  id: CalmLing # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 240
      max: 420
  - type: AntagSelection
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 4
      playerRatio: 22
      lateJoinAdditional: true
      mindComponents:
      - type: ChangelingRole
        prototype: Changeling
        
- type: entity
  parent: BaseNukeopsRule
  id: Calmops # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: LoadMapRule
    gameMap: NukieOutpost
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ NukeopsCommander ]
      fallbackRoles: [ Nukeops, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsCommander
      startingGear: SyndicateCommanderGearFull
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - nukeops-role-commander
        - SyndicateNamesElite
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindComponents:
      - type: NukeopsRole
        prototype: NukeopsCommander
    - prefRoles: [ NukeopsMedic ]
      fallbackRoles: [ Nukeops, NukeopsCommander ]
      spawnerPrototype: SpawnPointNukeopsMedic
      startingGear: SyndicateOperativeMedicFull
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - nukeops-role-agent
        - SyndicateNamesNormal
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindComponents:
      - type: NukeopsRole
        prototype: NukeopsMedic
    - prefRoles: [ Nukeops ]
      fallbackRoles: [ NukeopsCommander, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsOperative
      max: 3
      playerRatio: 15
      startingGear: SyndicateOperativeGearFull
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - nukeops-role-operator
        - SyndicateNamesNormal
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindComponents:
      - type: NukeopsRole
        prototype: Nukeops
        
- type: entity
  id: CalmRevs # For Dual Antag Gamemodes
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 30
  - type: RevolutionaryRule
  - type: AntagSelection
    definitions:
    - prefRoles: [ HeadRev ]
      max: 2
      playerRatio: 25
      briefing:
        text: head-rev-role-greeting
        color: CornflowerBlue
        sound: "/Audio/Ambience/Antag/headrev_start.ogg"
      startingGear: HeadRevGear
      components:
      - type: Revolutionary
      - type: HeadRevolutionary
      mindComponents:
      - type: RevolutionaryRole
        prototype: HeadRev
        
- type: entity
  parent: BaseTraitorRule
  id: AutoTraitorWave1 # For Autotraitor Gamemode
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 600
      max: 900
  - type: AntagSelection
    definitions:
    - prefRoles: [ Traitor ]
      max: 3
      playerRatio: 20
      blacklist:
        components:
        - AntagImmune
        - Changeling
      lateJoinAdditional: true # Pretty strange, but having 3 Late join additionals doesn't really break anything
      mindComponents:
      - type: TraitorRole
        prototype: Traitor
        
- type: entity
  parent: BaseTraitorRule
  id: AutoTraitorWave2 # For Autotraitor Gamemode
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 1200
      max: 1800
  - type: AntagSelection
    definitions:
    - prefRoles: [ Traitor ]
      max: 3
      playerRatio: 25
      blacklist:
        components:
        - AntagImmune
        - Changeling
        - Traitor # Prevents double traitor
      lateJoinAdditional: true
      mindComponents:
      - type: TraitorRole
        prototype: Traitor
        
- type: entity
  parent: BaseTraitorRule
  id: AutoTraitorWave3 # For Autotraitor Gamemode
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 2100
      max: 2700
  - type: AntagSelection
    definitions:
    - prefRoles: [ TraitorSleeper ] # After the 30 minute mark. Basically a scripted sleeper event so it makes sense to have sleeper prefs here
      fallbackRoles: [ Traitor ] 
      max: 3
      playerRatio: 30
      blacklist:
        components:
        - AntagImmune
        - Changeling
        - Traitor
      lateJoinAdditional: true
      mindComponents:
      - type: TraitorRole
        prototype: Traitor

- type: entity
  parent: BaseTraitorRule
  id: AutoTraitorWave4 # For Autotraitor Gamemode - At around an hour.
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 3000
      max: 3600
  - type: AntagSelection
    definitions:
    - prefRoles: [ TraitorSleeper ] 
      fallbackRoles: [ Traitor ] 
      max: 3
      playerRatio: 35
      blacklist:
        components:
        - AntagImmune
        - Changeling
        - Traitor
      lateJoinAdditional: true
      mindComponents:
      - type: TraitorRole
        prototype: Traitor
        
- type: entity
  parent: BaseTraitorRule
  id: AutoTraitorWave5 # For Autotraitor Gamemode - The last "Fuck you, NT!" before shuttle auto call
  components:
  - type: GameRule
    minPlayers: 30
    delay:
      min: 4800
      max: 5400
  - type: AntagSelection
    definitions:
    - prefRoles: [ TraitorSleeper ] 
      fallbackRoles: [ Traitor ] 
      max: 3
      playerRatio: 40
      blacklist:
        components:
        - AntagImmune
        - Changeling
        - Traitor
      lateJoinAdditional: true
      mindComponents:
      - type: TraitorRole
        prototype: Traitor
